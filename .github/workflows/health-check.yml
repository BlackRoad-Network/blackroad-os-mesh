name: Production Health Check

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM (was every hour - too many runs)
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check service health
        run: |
          SERVICES=(
            "https://api.blackroad.io/health"
            "https://agents.blackroad.io/health"
            "https://monitoring.blackroad.io/health"
          )
          FAILED=0
          for url in "${SERVICES[@]}"; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$url" --max-time 15 || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "::notice::OK: $url"
            else
              echo "::warning::$url returned $HTTP_CODE (non-fatal)"
              FAILED=$((FAILED + 1))
            fi
          done
          echo "Health check complete. $FAILED service(s) reported non-200."
